<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
</head>
<body>
    <h1>Registro</h1>
    <h2>Crear cuenta:</h2>
    <form>
        <input type="text" placeholder="Nombre" title="Nombre" name="username" minlength="3" maxlength="100" required>
        <input type="email" placeholder="Correo electrónico" title="Correo electrónico" name="email" required>
        <input type="password" placeholder="Contraseña" title="Contraseña" name="password" minlength="6" maxlength="100" required>
        <input type="password" placeholder="Confirmar contraseña" title="Confirmar contraseña" name="confirm_password" required>
        <input type="date" name="Fecha_Nacimiento" title="Fecha de nacimiento">
        <input type="submit" value="Registrarse" title="Registrarse" href="login.html" target="_blank">
    </form>
</body>
</html>
