<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

</head>
<body>
    <h1>login</h1>
    <h2>iniciar sesion:</h2>
    <form>
        <input type="email" placeholder="correo@ejemplo.com" title="Correo electrónico" name="email" required>
        <input type="text" placeholder="usuario" title="Usuario" name="username" required>
        <input type="password" placeholder="Contraseña" title="Contraseña" name="password" required>
        <input type="checkbox" title="Recordar contraseña"> Recordar contraseña
        <input type="radio"  title="Opción 1"> Aceptar Uso de datos
        <input type="radio"  title="Opción 2"> Aceptar Terminos y Condiciones
        <input type="submit" value="Iniciar Sesión" href="/Sistema/sistema.html" title="Iniciar Sesión" target="_blank">
    </form>
    <p>Aun no estas registrado?</p>
    <a href="registro.html" title="Registrarse">Registrarse</a>
</body>
</html>
